spring.application.name=JAuth
server.port=3002
# MySQL Configuration
# You can override these via environment variables DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/jauth
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidationPurposeOnlyDontShareThisWithAnyone
jwt.expiration=3600000

# Error Handling Configuration
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param
server.error.include-exception=false

