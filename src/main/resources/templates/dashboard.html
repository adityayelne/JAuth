<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - JAuth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .navbar {
            background: white;
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .navbar h1 {
            color: #667eea;
            font-size: 24px;
        }
        .navbar button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .navbar button:hover {
            background: #764ba2;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .profile-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .profile-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #dee2e6;
        }
        .profile-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .profile-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .profile-value {
            color: #333;
            font-size: 16px;
            margin-top: 5px;
            font-weight: 500;
        }
        .message {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🔐 JAuth Dashboard</h1>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <h2>Welcome, <span id="userName">User</span>!</h2>
        <p class="subtitle">This is a protected page. You can only see this if you're logged in.</p>
        
        <div class="message" id="message"></div>
        
        <h3 style="margin-top: 30px; color: #333; margin-bottom: 20px;">Your Profile</h3>
        <div class="profile-section" id="profileSection">
            <p style="color: #666;">Loading profile...</p>
        </div>
    </div>

    <script>
        /**
         * DASHBOARD FLOW (Protected Page):
         * 1. Page loads -> checks if JWT token exists in localStorage
         * 2. If no token -> redirect to login (user not authenticated)
         * 3. If token exists -> fetch user profile from /api/protected/profile
         * 4. Include token in Authorization header
         * 5. Server validates token with JwtAuthenticationFilter
         * 6. Server returns user data
         * 7. Display user info on dashboard
         */
        
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            
            // If no token, user is not authenticated -> redirect to login
            if (!token) {
                window.location.href = '/';
                return;
            }
            
            // Load user data
            loadProfile(token);
        });
        
        /**
         * Fetch user profile from protected endpoint
         * Includes JWT token in Authorization header
         */
        async function loadProfile(token) {
            try {
                const response = await fetch('/api/protected/profile', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token  // Include JWT token
                    }
                });
                
                if (!response.ok) {
                    // Token invalid or expired
                    if (response.status === 401) {
                        logout();
                        return;
                    }
                    throw new Error('Failed to load profile');
                }
                
                const user = await response.json();
                
                // Display user data
                document.getElementById('userName').textContent = user.fullName;
                document.getElementById('profileSection').innerHTML = `
                    <div class="profile-item">
                        <div class="profile-label">Full Name</div>
                        <div class="profile-value">${user.fullName}</div>
                    </div>
                    <div class="profile-item">
                        <div class="profile-label">Email</div>
                        <div class="profile-value">${user.email}</div>
                    </div>
                    <div class="profile-item">
                        <div class="profile-label">Account Status</div>
                        <div class="profile-value">${user.enabled ? 'Active' : 'Disabled'}</div>
                    </div>
                    <div class="profile-item">
                        <div class="profile-label">User ID</div>
                        <div class="profile-value">${user.id}</div>
                    </div>
                `;
            } catch (error) {
                showMessage('Error loading profile: ' + error.message, 'error');
            }
        }
        
        /**
         * Logout: clear token and redirect to login
         */
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('email');
            localStorage.removeItem('fullName');
            window.location.href = '/';
        }
        
        function showMessage(msg, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = msg;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
        }
    </script>
</body>
</html>
